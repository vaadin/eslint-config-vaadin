name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --legacy-peer-deps

      - run: npm run typecheck

      - run: npm run build

      - name: Check for missing rules
        run: npm run check
        env:
          CHROME_BIN: google-chrome-stable
